apiVersion: apps/v1
kind: Deployment
metadata:
  name: wisecow-project-deployment
  namespace: wisecow
  labels:
    app: wisecow
spec:
  replicas: 3
  selector:
    matchLabels:
      app: wisecow
  template:
    metadata:
      labels:
        app: wisecow
    spec:
      containers:
      - name: wisecow
        image: docker.io/dheryam/wisecow:latest
        ports: 
        - containerPort: 4499

